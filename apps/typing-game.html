<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한국어 타이핑</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&family=Song+Myung&family=Nanum+Myeongjo:wght@400;700&display=swap');

:root {
  --bg-top:#c8c8d4; --bg-bot:#9898a8;
  --primary-color: rgb(102, 126, 234);
  --secondary-color: rgb(118, 75, 162);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ width:100%; height:100%; overflow:hidden;
  font-family:'Jua','Noto Sans KR',sans-serif;
  touch-action:manipulation; }
body{
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bot) 100%);
  transition:background 2s ease;
}

/* ===== SCREENS ===== */
.screen{
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity .4s;
}
.screen.off{ opacity:0; pointer-events:none; }

/* Gradient background shared by title + pause */
.menu-screen{
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
}

/* White content card */
.menu-card{
  position:relative;
  background:#fff;
  border-radius:20px;
  padding:40px;
  display:flex; flex-direction:column;
  align-items:center;
  gap:6px;
  width:min(720px, 96vw);
  max-height:92vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  color:#1a1a2e;
}
.menu-card::-webkit-scrollbar{ width:4px; }
.menu-card::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.15); border-radius:2px; }

/* ===== TITLE ===== */
#scr-title h1{
  font-size: 36px;
  color: #667eea;
  margin-bottom:2px; text-align:center;
}
#scr-title .sub{
  font-size:clamp(.7rem,1.5vw,.85rem);
  color:#888; margin-bottom:16px;
  font-family:'Noto Sans KR',sans-serif;
}
@keyframes glow{
  0%,100%{text-shadow:0 0 20px #ff448866;}
  50%{text-shadow:0 0 50px #ff4488ff,0 0 90px #ff448840;}
}

.setup-wrap{
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; width:100%; margin-bottom:16px;
}
.scard{
  background:#f7f7fa;
  border:1px solid rgba(0,0,0,.07);
  border-radius:14px; padding:14px 16px;
  color:#1a1a2e;
}
.scard h3{
  font-size:.65rem; text-transform:uppercase;
  letter-spacing:2px; color:#3e3e3e; margin-bottom:10px;
}
.scard.wide{ grid-column:1/-1; }

/* lives card */
.gopts-grid{ display:flex; flex-direction:column; gap:8px; max-height:210px; overflow-y:auto; }
.gopts-grid::-webkit-scrollbar{ width:4px; }
.gopts-grid::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.15); border-radius:2px; }
.gopt-card{
  background:#fff; border:1px solid rgba(0,0,0,.08);
  border-radius:10px; padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; width:100%; box-sizing:border-box;
}
.gopt-label{ font-size:.62rem; text-transform:uppercase; letter-spacing:1.5px; color:#555; text-align:center; }
.lives-row{
  display:flex; align-items:center;
  justify-content:center; gap:10px;
}
.lives-row label{ font-size:1rem; opacity:.65; }
#inp-lives{
  width:68px; padding:6px 8px;
  background:#f7f7fa; border:1px solid #ddd;
  border-radius:8px; color:#2b2b2b;
  font-family:inherit; font-size:1.2rem; text-align:center;
}
/* toggle switch */
.gopt-toggle{ display:flex; align-items:center; cursor:pointer; }
.gopt-toggle input{ display:none; }
.gopt-track{
  width:38px; height:22px; border-radius:11px;
  background:#ddd; position:relative; transition:background .2s;
  display:block;
}
.gopt-toggle input:checked ~ .gopt-track{ background:#667eea; }
.gopt-thumb{
  position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%;
  background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25);
  transition:transform .2s;
}
.gopt-toggle input:checked ~ .gopt-track .gopt-thumb{ transform:translateX(16px); }
#pl-lives{ font-size:.88rem; margin-top:8px; order:99; max-width:880px; }

/* hero picker */
.epicker{
  display:flex; flex-wrap:wrap; gap:6px;
  max-height:100px; overflow-y:auto;
}
.epicker::-webkit-scrollbar{ width:4px; }
.epicker::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.15); border-radius:2px; }
.eopt{
  font-size:2rem; cursor:pointer;
  padding:3px 4px; border-radius:8px;
  transition:transform .13s,background .13s;
  border:2px solid transparent;
}
.eopt:hover{ transform:scale(1.2); background:rgba(0,0,0,.06); }
.eopt.sel{ border-color:#667eea; background:rgba(102,126,234,.1); }

/* skin/gender row */
.skin-row{
  display:flex; flex-wrap:wrap; gap:6px;
  margin-top:8px; padding-top:8px;
  border-top:1px solid rgba(0,0,0,.07);
  align-items:center;
}
.skin-row label{ font-size:.65rem; color:#848484; margin-right:4px; }
/* Each group (skin or gender) wraps as a unit */
.skin-group{
  display:flex; align-items:center; gap:4px; flex-wrap:nowrap;
}
.skin-btn{
  font-size:1.1rem; cursor:pointer;
  padding:2px 4px; border-radius:6px;
  border:2px solid transparent; background:none;
  transition:all .12s;
}
.skin-btn:hover{ background:rgba(0,0,0,.06); }
.skin-btn.sel{ border-color:#667eea; background:rgba(102,126,234,.1); }
.gender-btn{
  font-size:1.1rem; cursor:pointer;
  padding:2px 6px; border-radius:6px;
  border:1px solid #ddd; background:none;
  color:#555; transition:all .12s;
}
.gender-btn:hover{ background:rgba(0,0,0,.05); }
.gender-btn.sel{ border-color:#667eea; background:rgba(102,126,234,.1); color:#667eea; }

/* weapon groups */
.wg-list{ display:flex; flex-direction:column; gap:5px; max-height:210px; overflow-y:auto; }
.wg-list::-webkit-scrollbar{ width:4px; }
.wg-list::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.15); border-radius:2px; }
.wgbtn{
  background:#fff; border:1px solid #e0e0e0;
  border-radius:9px; padding:7px 11px;
  color:#333; cursor:pointer;
  font-family:inherit; font-size:.82rem;
  transition:all .13s; text-align:left;
  white-space:nowrap;
}
.wgbtn:hover{ background:#f0f0f5; }
.wgbtn.sel{ border-color:#667eea; background:rgba(102,126,234,.08); color:#667eea; }
.wg-lbl{ font-size:.9rem; color:#646464; display:block; margin-bottom:2px; }

#btn-play{
  padding:13px 56px; font-size:1.25rem;
  font-family:inherit; border:none; border-radius:50px;
  background:linear-gradient(135deg,var(--primary-color),var(--secondary-color));
  color:#fff; cursor:pointer;
  box-shadow:0 8px 28px rgba(102,126,234,.4);
  transition:all .18s; letter-spacing:1px;
}
#btn-play:hover{ transform:translateY(-3px); box-shadow:0 14px 36px rgba(102,126,234,.6); }

/* ===== GAMEOVER ===== */
#scr-over{
  background:rgba(6,3,16,.94);
  color:#fff; gap:12px;
  backdrop-filter:blur(12px);
}
#scr-over h2{ font-size:clamp(2rem,6vw,3.5rem); text-align:center; }
#go-detail{ font-size:.9rem; opacity:.65; text-align:center; }
#go-hiscore{ font-size:.85rem; color:#ffd700; opacity:.9; }
#btn-restart{
  padding:11px 38px; font-size:1rem;
  font-family:inherit;
  border:2px solid #ff4488; border-radius:50px;
  background:transparent; color:#ff4488;
  cursor:pointer; transition:all .18s; margin-top:8px;
}
#btn-restart:hover{ background:#ff4488; color:#fff; }

/* ===== PAUSE CARD ===== */
.pause-card{
  position:relative;
  background:#fff;
  border-radius:20px;
  padding:36px 48px 32px;
  display:flex; flex-direction:column;
  align-items:center; gap:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  min-width:280px;
  color:#1a1a2e;
}
#scr-pause h2{
  font-size:clamp(1.8rem,5vw,2.8rem);
  color: #667eea;
}
.pause-btns{ display:flex; flex-direction:column; gap:10px; margin-top:4px; width:100%; }
.pause-btn{
  padding:12px 40px; font-size:1rem;
  font-family:inherit; border-radius:50px;
  cursor:pointer; transition:all .18s;
  letter-spacing:.5px; width:100%;
}
#btn-resume{
  background:linear-gradient(135deg,var(--primary-color),var(--secondary-color));
  border:none; color:#fff;
  box-shadow:0 6px 20px rgba(102,126,234,.35);
}
#btn-resume:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(102,126,234,.55); }
#btn-menu{
  background:transparent;
  border:2px solid #d0d0d0;
  color:#3e3e3e;
}
#btn-menu:hover{ border-color:#aaa; color:#1a1a2e; }

/* ===== CLOSE BUTTON (inside .menu-card / .pause-card) ===== */
.close-btn{
  position:absolute; top:14px; right:14px;
  width:28px; height:28px; border-radius:50%;
  background:#ff6b6b; border:none;
  color:#fff; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s; opacity:0; padding:0;
  z-index:10;
}
.close-btn::before{ content:"✕"; }
.close-btn:hover{ background:#ff5252; transform:scale(1.1); }
.menu-card:hover .close-btn,
.pause-card:hover .close-btn{ opacity:.33; }
.close-btn:hover{ opacity:1 !important; }
@media(max-width:600px){
  .close-btn{ opacity:.5; }
  .menu-card{ padding:20px 16px 18px; }
  .pause-card{ padding:28px 28px 24px; }
}

/* ===== FOOTER LINK (title screen) ===== */
#title-footer{
  font-size:14px; color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  margin-top:30px; text-align:center;
}
#title-footer a{ color:#fff; text-decoration:none; opacity:1; }
#title-footer a:hover{ text-decoration:underline; }

/* ===== CANVAS ===== */
#gc{ position:fixed; inset:0; pointer-events:none; z-index:51; }

/* ===== HUD ===== */
#hud{
  position:fixed; top:8px; left:8px; right:8px;
  display:none; align-items:stretch; gap:8px;
  justify-content:space-between;
  z-index:50;
}
#hcard-wave{ pointer-events:none; min-width:160px; }
#hcard-score{ pointer-events:all; min-width:130px; }

.hcard{
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.18);
  border-radius:12px; padding:7px 13px;
  color:#fff; font-size:.78rem;
  display:flex; flex-direction:column; justify-content:space-between;
}
.hlbl{
  font-size:.6rem; opacity:.5;
  text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:6px;
}

/* Wave card body: ring on left, text on right */
.wave-body{
  display:flex; align-items:center; gap:10px;
}
.wave-ring-wrap{ flex-shrink:0; }
.wave-text{ display:flex; flex-direction:column; }
#hw-num{ font-size:1.5rem; font-weight:bold; line-height:1; }
#hw-boss{ font-size:.62rem; opacity:.55; margin-top:2px; white-space:nowrap; }

/* Score card body: vals on left, pause on right */
.score-body{
  display:flex; align-items:center; gap:10px; justify-content:flex-end;
}
.score-vals{ display:flex; flex-direction:column; text-align:right; }
#hs-val{ font-size:1.5rem; font-weight:bold; color:#ffd700; line-height:1; }
#hs-best-row{ font-size:.62rem; opacity:.4; margin-top:2px; }
#btn-pause{
  flex-shrink:0;
  width:48px; height:48px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2);
  border-radius:8px;
  color:#fff; font-size:1.5rem; line-height:0;
  cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center;
}
#btn-pause:hover{ background:rgba(255,255,255,.2); }

@media(max-width:600px){
  #hud{ gap:5px; }
  #hcard-wave{ min-width:0; padding:6px 10px; }
  #hcard-score{ min-width:0; padding:6px 10px; }
  #hw-num{ font-size:1.1rem; }
  .wave-ring-wrap svg{ width:34px; height:34px; }
  #hs-val{ font-size:1.1rem; }
  #hs-best-row{ display:none; }
  #btn-pause{ width:36px; height:36px; font-size:1.1rem; }
}

/* ===== PLAYER AREA ===== */
#player-area{
  position:fixed; bottom:0; left:0; right:0;
  display:none; flex-direction:column;
  align-items:center; padding-bottom:10px;
  z-index:40;
}
#pl-name{ font-size:.72rem; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.9); margin-bottom:8px; }
#pl-emoji{
  font-size:4.5rem;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
  transition:transform .12s;
  line-height:1;
  margin-bottom:8px;
}
#inp-wrap{
  display:flex; align-items:center; gap:8px;
  background:rgba(0,0,0,.55); backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,.3); border-radius:30px;
  padding:8px 18px; width:min(380px,92vw);
  transition:border-color .18s;
}
#inp-wrap:focus-within{ border-color:rgba(255,255,255,.7); }
#spell-ico{ font-size:1.05rem; }
#typing{
  flex:1; background:none; border:none; outline:none;
  color:#fff; font-family:'Noto Sans KR',sans-serif;
  font-size:1rem; caret-color:#ff4488;
}
#typing::placeholder{ color:rgba(255,255,255,.3); }

/* ===== ANNOUNCEMENTS ===== */
#announce{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; z-index:60;
  /* will be overridden in JS for mobile keyboard */
}
#announce-txt{
  font-size:clamp(2rem,7vw,4.5rem); color:#fff;
  text-shadow:0 0 30px rgba(255,210,80,.8),0 4px 10px rgba(0,0,0,.6);
  opacity:0; transition:opacity .35s ease;
  text-align:center; padding:0 16px;
}
#announce-txt.on{ opacity:1; }

/* ===== FREEZE OVERLAY ===== */
#freeze-overlay{
  position:fixed; inset:0; z-index:70;
  background:rgba(100,180,255,0.28);
  pointer-events:none; opacity:0;
  transition:opacity .15s;
}
#freeze-overlay.on{ opacity:1; }

/* ===== WEATHER CANVAS ===== */
#wx-canvas{ position:fixed; inset:0; pointer-events:none; z-index:52; opacity:0.72; }

/* ===== CHEAT MENU ===== */
#cheat-menu{
  position:fixed; z-index:999;
  background:#1a1a2e; color:#e0e0ff;
  border:1px solid #667eea; border-radius:14px;
  padding:16px 18px; width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  font-family:'Noto Sans KR',sans-serif; font-size:.82rem;
  display:none; top:80px; left:20px;
  cursor:default; user-select:none;
}
#cheat-menu.on{ display:block; }
#cheat-title{
  font-size:1rem; font-weight:bold; color:#aab8ff;
  margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;
}
#cheat-close{ cursor:pointer; opacity:.6; font-size:1.2rem; line-height:1; }
#cheat-close:hover{ opacity:1; }
.cheat-row{
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px; flex-wrap:wrap;
}
.cheat-row label{ flex:1; min-width:80px; }
.cheat-btn{
  background:#667eea; color:#fff; border:none;
  border-radius:6px; padding:4px 10px; cursor:pointer;
  font-size:.78rem;
}
.cheat-btn:hover{ background:#8899ff; }
.cheat-btn.red{ background:#e74c3c; }
.cheat-btn.red:hover{ background:#ff6666; }
.cheat-inp{
  width:54px; background:#2a2a4e; color:#fff;
  border:1px solid #667eea; border-radius:5px;
  padding:3px 6px; font-size:.78rem;
}
#cheat-god-lbl{ color:#ffd700; font-weight:bold; font-size:.75rem; }

#cfx{ position:fixed; inset:0; pointer-events:none; z-index:55; overflow:hidden; }
.cp{
  position:absolute; top:-18px; border-radius:2px;
  animation:cffall linear forwards;
}
@keyframes cffall{ to{ transform:translateY(110vh) rotate(720deg); opacity:0; } }
#well-done{
  position:fixed; left:50%;
  transform:translateX(-50%) translateY(-50%);
  font-size:clamp(2rem,7vw,4rem); color:#fff;
  text-shadow:0 0 30px rgba(120,220,255,.9);
  opacity:0; transition:opacity .45s;
  z-index:56; pointer-events:none; white-space:nowrap;
  top:50%; /* overridden by JS on mobile */
}
#well-done.on{ opacity:1; }
</style>
</head>
<body>

<!-- TITLE -->
<div id="scr-title" class="screen menu-screen">
  <div class="menu-card">
    <button class="close-btn" onclick="window.location.href='../index.html'"></button>
    <h1>⌨️ 한국어 타이핑</h1>
    <p class="sub">Korean Typing Defense — Defeat monsters by typing!</p>
    <div class="setup-wrap">

      <!-- Hero picker -->
      <div class="scard wide">
        <h3>Choose your hero</h3>
        <div class="epicker" id="hero-pick"></div>
        <div class="skin-row" id="skin-row" style="display:none">
          <div class="skin-group">
            <label>Skin:</label>
            <div id="skin-btns"></div>
          </div>
          <div class="skin-group" id="gender-group">
            <label>Gender:</label>
            <div id="gender-btns"></div>
          </div>
        </div>
      </div>

      <!-- Weapon style -->
      <div class="scard">
        <h3>Weapon style</h3>
        <div class="wg-list" id="wg-pick"></div>
      </div>

      <!-- Game Options -->
      <div class="scard" id="scard-options">
        <h3>Game Options</h3>
        <div class="gopts-grid">

          <div class="gopt-card">
            <div class="gopt-label">❤️ Starting Lives</div>
            <div class="lives-row">
              <input type="number" id="inp-lives" min="1" max="100" value="10">
            </div>
          </div>

          <div class="gopt-card">
            <div class="gopt-label">🔤 Varying Fonts</div>
            <label class="gopt-toggle">
              <input type="checkbox" id="chk-fonts" checked>
              <span class="gopt-track"><span class="gopt-thumb"></span></span>
            </label>
          </div>

          <div class="gopt-card">
            <div class="gopt-label">🌤️ Weather</div>
            <label class="gopt-toggle">
              <input type="checkbox" id="chk-weather" checked>
              <span class="gopt-track"><span class="gopt-thumb"></span></span>
            </label>
          </div>

        </div>
      </div>

    </div>
    <button id="btn-play">▶ 게임 시작!</button>
  </div>
  <p id="title-footer">
    <a href="../index.html">🇰🇷 한국말 공부</a>ㅤ•ㅤBuilt with care by <a href="https://github.com/lluckymou" target="_blank">llucmou 🌲</a>
  </p>
</div>

<!-- GAMEOVER -->
<div id="scr-over" class="screen off">
  <h2 id="go-title">🪦 게임 오버</h2>
  <div id="go-detail"></div>
  <div id="go-hiscore"></div>
  <button id="btn-restart">↩ Try Again</button>
</div>

<!-- PAUSE -->
<div id="scr-pause" class="screen menu-screen off">
  <div class="pause-card">
    <button class="close-btn" onclick="window.location.href='../index.html'"></button>
    <h2>⏸ Paused</h2>
    <div class="pause-btns">
      <button class="pause-btn" id="btn-resume">▶ Resume</button>
      <button class="pause-btn" id="btn-menu">↩ Main Menu</button>
    </div>
  </div>
</div>

<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hcard" id="hcard-wave">
    <div class="hlbl">Wave</div>
    <div class="wave-body">
      <div class="wave-ring-wrap">
        <svg id="wave-ring" viewBox="0 0 36 36" width="44" height="44">
          <circle class="ring-bg" cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="3"/>
          <circle id="ring-arc" cx="18" cy="18" r="15.9" fill="none" stroke="#4caf50" stroke-width="3"
            stroke-dasharray="0 100" stroke-linecap="round"
            transform="rotate(-90 18 18)" style="transition:stroke-dasharray .3s ease"/>
          <text id="weather-icon" x="18" y="22" text-anchor="middle" font-size="11" style="pointer-events:none;font-family:serif">🌞</text>
        </svg>
      </div>
      <div class="wave-text">
        <div id="hw-num">1</div>
        <div id="hw-boss">Boss in 10</div>
      </div>
    </div>
  </div>
  <div class="hcard" id="hcard-score">
    <div class="hlbl">Score</div>
    <div class="score-body">
      <div class="score-vals">
        <div id="hs-val">0</div>
        <div id="hs-best-row">Best: <span id="hs-best">0</span></div>
      </div>
      <button id="btn-pause">⏸</button>
    </div>
  </div>
</div>

<!-- PLAYER -->

function countJamo(str) {
  let n = 0;
  for (const ch of str) {
    const c = ch.charCodeAt(0);
    if (c >= 0xAC00 && c <= 0xD7A3) {
      n += 2 + (((c - 0xAC00) % 28) > 0 ? 1 : 0);
    } else if (c > 0x20) n++;
  }
  return n;
}

/* Hero definitions: base emoji, whether it supports skin tones, gender variants.
   For skin-tone support we store all 5 skin variants explicitly per gender to avoid
   broken ZWJ insertion heuristics. */
const SKIN_TONES = ['','🏻','🏼','🏽','🏾','🏿']; // '' = default yellow

// Build a hero def with skin support using actual ZWJ sequences
function heroWithSkins(neutral, man, woman) {
  // neutral/man/woman are base (yellow/default) versions
  // Skin variants are constructed by inserting the Fitzpatrick modifier
  // after the first emoji codepoint of the base string.
  function addSkin(base, skinMod) {
    if (!skinMod) return base;
    // Split into grapheme clusters via spread (works for most ZWJ sequences)
    // Strategy: insert skin modifier after the very first unicode scalar
    const cp = [...base]; // array of grapheme clusters
    // Find first human-base codepoint and insert skin after it
    // For simple single-person emoji: insert after [0]
    // For ZWJ sequences like 🧑‍🏫: insert after [0] before ZWJ
    // We reconstruct: first_char + skin + rest
    return cp[0] + skinMod + cp.slice(1).join('');
  }
  return {
    neutral: SKIN_TONES.map(s => addSkin(neutral, s)),
    man:     man   ? SKIN_TONES.map(s => addSkin(man,   s)) : null,
    woman:   woman ? SKIN_TONES.map(s => addSkin(woman, s)) : null,
    hasSkin:   true,
    hasGender: !!(man && woman),
  };
}

function heroNoMod(emoji) {
  return { neutral:[emoji], man:null, woman:null, hasSkin:false, hasGender:false };
}

/* ================================================================
   WORD PICKING — strictly controlled by wave
   Wave 1:   d ≤ 2   (single syllable, 2 jamo max)
   Wave 2:   d ≤ 3
   Wave 3:   d ≤ 4
   Wave 4:   d ≤ 5
   Wave 5:   d ≤ 6
   Wave 6-7: d ≤ 8 (start of 4+ jamo "hard" words)
   Wave 8+:  d ≤ 10+
================================================================ */
function maxDiffForWave(wn) {
  if (wn === 1) return 2;
  if (wn === 2) return 3;
  if (wn === 3) return 4;
  if (wn === 4) return 5;
  if (wn === 5) return 6;
  if (wn <= 7)  return 8;
  if (wn <= 9)  return 10;
  if (wn <= 12) return 13;
  if (wn <= 16) return 16;
  return Math.min(35, 16 + Math.floor((wn - 16) * 0.8));
}

function minDiffForWave(wn) {
  // ensure some easier words always appear too
  return Math.max(2, Math.floor(maxDiffForWave(wn) * 0.3));
}

function pickWords(wn, count) {
  const maxD = maxDiffForWave(wn);
  const minD = minDiffForWave(wn);
  let pool = WORDS.filter(w => w.d >= minD && w.d <= maxD);
  if (pool.length < count) pool = WORDS.filter(w => w.d <= maxD);
  if (pool.length < count) pool = WORDS;
  const used = new Set(G.monsters.flatMap(m => m.words));
  const sh = [...pool].sort(() => Math.random() - 0.5);
  const out = [];
  for (const w of sh) {
    if (!used.has(w.text)) { out.push(w.text); used.add(w.text); }
    if (out.length >= count) break;
  }
  while (out.length < count) out.push(sh[out.length % sh.length]?.text || '가');
  return out;
}

/* ================================================================
   MONSTER HP — tight control per wave
================================================================ */
function calcHP(wn) {
  // Multi-life monsters appear from wave 5
  if (wn < 5) return 1;
  const r = Math.random();
  if (wn < 7)  return r < 0.15 ? 2 : 1;
  if (wn < 10) return r < 0.10 ? 3 : r < 0.35 ? 2 : 1;
  const cap = Math.min(7, 1 + Math.floor(wn / 4));
  return Math.max(1, cap - (r > 0.5 ? 1 : 0));
}

/* ================================================================
   WAVE GENERATION — dynamic trigger-based spawning
   Instead of pre-queuing all monsters, we use a budget system.
   Each wave has a "point budget". Multi-HP monsters cost more points.
   Monsters are released in groups; a new group triggers when
   the previous group is sufficiently dealt with.
================================================================ */
function wavePointBudget(wn) {
  if (wn === 1) return 1;      // tutorial: 1 monster
  if (wn === 2) return 5;
  if (wn === 3) return 8;
  if (wn === 4) return 11;
  return Math.floor(11 + (wn - 4) * 2.2);
}

function waveGroupSize(wn) {
  // How many to send in each group
  if (wn === 1) return 1;
  if (wn <= 3)  return 2;
  if (wn <= 6)  return 3;
  if (wn <= 10) return 4;
  return Math.min(6, 3 + Math.floor(wn / 6));
}

/* Build the wave's monster template list (budget-based) */
function genWave(wn) {
  const boss = wn % 10 === 0;
  if (boss) {
    const hp  = Math.min(5 + Math.floor(wn/10)*2, 15);
    const wds = pickWords(wn, hp + 2);
    return [{ type:'boss', hp, maxHp:hp, words:wds }];
  }

  const budget  = wavePointBudget(wn);
  const templates = [];
  let spent = 0;

  while (spent < budget) {
    const hp      = calcHP(wn);
    const cost    = hp; // 1HP = 1pt, 2HP = 2pts, etc.
    if (spent + cost > budget && templates.length > 0) break;
    const wds = pickWords(wn, hp);
    templates.push({ type:'normal', hp, maxHp:hp, words:wds });
    spent += cost;
  }

  return templates;
}

/* ================================================================
   JAMO KEY-COUNT (counts physical keypresses for a Korean word)
   Double consonants/vowels (ㅃㅉㄸㄲㅆ, ㅒㅖ) = 2 keys
   Compound vowels (ㅘㅙㅚㅝㅞㅟㅢ etc) = 2 keys
   Compound batchim (ㄳㄵㄶㄺㄻㄼㄽㄾㄿㅀㅄ) = 2 keys
================================================================ */
function countJamoKeys(str) {
  let n = 0;
  for (const ch of str) {
    const c = ch.charCodeAt(0);
    if (c >= 0xAC00 && c <= 0xD7A3) {
      // Decompose syllable
      const v = c - 0xAC00;
      const jong = v % 28;
      const jung = Math.floor(v / 28) % 21;
      const cho  = Math.floor(v / 28 / 21);

      // Cho (initial consonant)
      // Double initials: ㅃ(6) ㅉ(9) ㄸ(3) ㄲ(1) ㅆ(13) — mapped in cho table
      const CHO_DOUBLE = new Set([1,3,6,9,13]); // indices of ㄲㄸㅃㅉㅆ
      n += CHO_DOUBLE.has(cho) ? 2 : 1;

      // Jung (vowel)
      // Compound vowels: ㅘ(8)ㅙ(9)ㅚ(10)ㅝ(13)ㅞ(14)ㅟ(15)ㅢ(19) = 2 keys
      // ㅒ(2) ㅖ(5) = 2 keys
      const JUNG_2 = new Set([2,5,8,9,10,13,14,15,19]);
      n += JUNG_2.has(jung) ? 2 : 1;

      // Jongseong (final consonant), 0 = none
      if (jong > 0) {
        // Compound batchim: 3(ㄳ)4(ㄵ)5(ㄶ)8(ㄺ)9(ㄻ)10(ㄼ)11(ㄽ)12(ㄾ)13(ㄿ)14(ㅀ)17(ㅄ) = 2 keys
        const JONG_2 = new Set([3,4,5,8,9,10,11,12,13,14,17]);
        n += JONG_2.has(jong) ? 2 : 1;
      }
    } else if (c > 0x20) {
      n += 1; // ASCII / space-separated
    }
  }
  return n;
}

/* Total key count for all words a monster has */
function monsterKeyCount(words) {
  return words.reduce((s, w) => s + countJamoKeys(w), 0);
}

/* ----------------------------------------------------------------
   Speed model
   
   An absolute beginner reading Hangul for the first time needs:
     - READ time: ~2.5 sec per syllable to recognise the characters
     - TYPE time: ~0.4 keys/sec (hunt-and-peck on an unfamiliar layout)
   
   Combined: totalSec = syllableCount * READ_SEC + keyCount / KPS
   
   Monster speed = travelDistance / totalSec
   
   Speed only grows when a boss is beaten (every 10 waves).
   Each monster also gets ±25% random jitter so they arrive spread out.
---------------------------------------------------------------- */
const READ_SEC_PER_SYL_BASE  = 2.5;   // seconds to READ one syllable, world 1
const READ_SEC_REDUCTION     = 0.18;  // read time shrinks per boss beaten
const READ_SEC_MIN           = 0.15;  // floor (expert reads instantly)
const KPS_BASE               = 0.4;   // keys/sec typing speed, world 1
const KPS_PER_WORLD          = 0.18;  // typing speed increase per boss
const KPS_CAP                = 6.0;   // expert cap

function countSyllables(words) {
  return words.reduce((n, w) => {
    for (const ch of w) {
      const c = ch.charCodeAt(0);
      if (c >= 0xAC00 && c <= 0xD7A3) n++;
    }
    return n;
  }, 0);
}

function worldLevel() {
  return Math.floor((G.wave - 1) / 10); // 0 for waves 1-9, 1 for 10-19, etc.
}

function monsterSpeed(words, isBoss, mob) {
  const keys  = monsterKeyCount(words);
  const syls  = countSyllables(words);
  const world = worldLevel();

  const readSec = Math.max(READ_SEC_MIN,  READ_SEC_PER_SYL_BASE - world * READ_SEC_REDUCTION);
  const kps     = Math.min(KPS_CAP,       KPS_BASE + world * KPS_PER_WORLD);
  const totalSec = syls * readSec + keys / kps;

  const travelH = G.vH * 0.72;
  let spd = travelH / Math.max(1, totalSec);

  if (isBoss) spd *= 0.55;
  // Per-monster gaussian jitter — most monsters near base speed,
  // extremes (±25%) are rare. Box-Muller transform.
  const u1 = Math.random() || 1e-10, u2 = Math.random();
  const gauss = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
  const jitter = Math.max(-0.25, Math.min(0.25, gauss * 0.1)); // σ=10%, clamp ±25%
  spd *= 1 + jitter;
  return Math.max(20, spd);
}

/* ================================================================
   DYNAMIC SPAWN SYSTEM
   State: G.wTemplates (remaining templates), G.activeGroup (current batch)
   Triggers: wave start → send first group; on monster kill/reach player → maybe send more
================================================================ */
function initWaveSpawner(templates) {
  G.wTemplates = [...templates];
  G.wBudgetLeft = templates.length;
  G.wKilled = 0;
  G.wTotal  = templates.length;   // for progress bar
  G.killed  = 0;
  sendNextGroup();
}

function sendNextGroup() {
  if (G.wTemplates.length === 0) return;
  const n = waveGroupSize(G.wave);
  for (let i = 0; i < n && G.wTemplates.length > 0; i++) {
    const tmpl = G.wTemplates.shift();
    // stagger slightly within a group
    setTimeout(() => {
      if (G.phase === 'play' && G.wPhase === 'spawning') {
        G.monsters.push(mkMonster(tmpl));
      }
    }, i * 400);
  }
}

// Called whenever a monster is removed (killed or reached player)
function onMonsterRemoved() {
  G.wKilled++;
  updProgress();
  // If remaining active monsters <= threshold, send more
  const remaining = G.monsters.filter(m => !m.dead).length
                  + (G.wTemplates ? G.wTemplates.length : 0);
  if (remaining === 0 && G.wPhase === 'spawning') {
    waveComplete();
    return;
  }
  // Send next group when active count drops low
  const active = G.monsters.filter(m => !m.dead).length;
  const triggerThreshold = Math.max(1, waveGroupSize(G.wave) - 1);
  if (active <= triggerThreshold && G.wTemplates && G.wTemplates.length > 0) {
    sendNextGroup();
  }
}

function updProgress() {
  const pct = Math.min(100, G.wKilled / Math.max(1, G.wTotal) * 100);
  // circumference of r=15.9 circle ≈ 100 units for easy % math
  ringArc.setAttribute('stroke-dasharray', pct.toFixed(1) + ' 100');
}

/* ================================================================
   PROJECTILES
================================================================ */
function rollNextSpell() {
  const we = WEAPONS[G.wgroup].e;
  G.nextSpell = we[Math.floor(Math.random() * we.length)];
  spellIco.textContent = G.nextSpell;
}

function fire(monster) {
  const emoji = G.nextSpell || WEAPONS[G.wgroup].e[0];
  const px    = G.W / 2;
  const py    = G.vH - playerAreaH() - 30;
  const dx    = monster.x - px, dy = monster.y - py;
  const d     = Math.hypot(dx, dy) || 1;
  G.projs.push({
    x:px, y:py, emoji, tid:monster.id,
    vx:dx/d*520, vy:dy/d*520,
    rot:0, rs:(Math.random()-.5)*18,
    size: 48,
    dead:false,
    born: performance.now(), // for arc animation
  });
  rollNextSpell();
}

/* ================================================================
   PARTICLES
================================================================ */
function explode(x, y, sz) {
  G.parts.push({ x, y, emoji:'💥', size:sz*.95, life:1, vy:-50 });
  for (let i = 0; i < 6; i++) {
    const a = Math.random()*Math.PI*2, s = 40+Math.random()*100;
    G.parts.push({
      x, y,
      emoji:['⭐','✨','💫','🌟'][i%4],
      size:10+Math.random()*13, life:1,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
    });
  }
}

/* ================================================================
   HIT & DAMAGE
================================================================ */
function hitMonster(m) {
  // Warrior shield blocks hit
  if (m.special === 'warrior' && m.shielded) {
    // Projectile just bounces off — no damage
    return;
  }
  // King is invulnerable while waiting for ninjas
  if (m.type === 'boss' && m.special === 'king' && m.kingWaiting) {
    return;
  }

  m.flash = 1; m.hp--;
  explode(m.x, m.y, m.size);
  G.score += G.wave * m.maxHp;
  hsVal.textContent = G.score.toLocaleString();
  if (m.hp <= 0) {
    m.dead = true;
    G.score += G.wave * m.maxHp * 4;
    hsVal.textContent = G.score.toLocaleString();
    // Boss kills all its minions
    if (m.type === 'boss') killBossMinions(m.id);
    // Projectile monsters don't trigger wave progression
    if (!m.isProjectileMonster) onMonsterRemoved();
  } else {
    m.wi++;
  }
}

function hurtPlayer(dmg = 1) {
  if (G.godMode) return;
  G.playerHP = Math.max(0, G.playerHP - dmg);
  refreshLives();
  plEmoji.style.transform = 'scale(1.5) rotate(-15deg)';
  setTimeout(() => plEmoji.style.transform = '', 220);
  if (G.playerHP <= 0) endGame();
}

/* ================================================================
   WEATHER SYSTEM
================================================================ */
const WEATHERS = ['sunny','foggy','drizzle','raining','snowing','blizzard','night','fall','blossom'];
const WEATHER_ICONS = {
  sunny:'🌞', foggy:'🌫️', drizzle:'🌦', raining:'🌧',
  snowing:'🌨', blizzard:'❄️', night:'🌑', fall:'🍁', blossom:'🌸'
};
const WEATHER_WEIGHTS = {
  sunny:30, foggy:12, drizzle:14, raining:12,
  snowing:10, blizzard:6, night:10, fall:8, blossom:8
};

function rollWeather(wn) {
  if (!G.weatherEnabled) return 'sunny';
  if (wn < 2) return 'sunny';
  const pool = [];
  const weights = { ...WEATHER_WEIGHTS };
  if (wn < 10) weights.night = 0; // night only from wave 10
  for (const [w, wt] of Object.entries(weights))
    for (let i = 0; i < wt; i++) pool.push(w);
  return pool[Math.floor(Math.random() * pool.length)];
}

function initWeather(w) {
  G.weather = w;
  G.wxParticles = [];
  G.wxFogOffset = 0;
  G.wxNight = (w === 'night');
  if (weatherIconEl) weatherIconEl.textContent = WEATHER_ICONS[w] || '🌞';
  // Seed particles
  const count = {drizzle:120, raining:280, snowing:160, blizzard:420, fall:50, blossom:50}[w] || 0;
  for (let i = 0; i < count; i++) {
    G.wxParticles.push(mkWxParticle(w, true));
  }
}

function mkWxParticle(type, scatter) {
  const p = { type, life: 1 };
  p.x = Math.random() * G.W;
  p.y = scatter ? Math.random() * G.vH : -10;
  if (type === 'drizzle' || type === 'raining') {
    p.vy = 300 + Math.random() * 140;
    p.vx = -30 + Math.random() * 60;
    p.len = type === 'raining' ? 18 + Math.random() * 12 : 9 + Math.random() * 6;
    p.alpha = type === 'raining' ? 0.55 + Math.random() * 0.3 : 0.38 + Math.random() * 0.25;
  } else if (type === 'snowing' || type === 'blizzard') {
    const sp = type === 'blizzard' ? 2.2 : 1;
    p.r = type === 'blizzard' ? 2.5 + Math.random() * 5 : 1.8 + Math.random() * 3;
    p.vy = 50 + Math.random() * 90 * sp;
    p.vx = (-40 + Math.random() * 80) * sp;
    p.wobble = Math.random() * Math.PI * 2;
    p.wobbleSpd = 0.5 + Math.random() * 1.5;
    // near-white hues
    const hue = Math.random() * 40;
    p.color = `hsl(${200+hue},${20+Math.random()*30}%,${88+Math.random()*10}%)`;
  } else if (type === 'fall' || type === 'blossom') {
    p.emoji = type === 'fall'
      ? ['🍂','🍁','🍃'][Math.floor(Math.random()*3)]
      : ['🌸','🌺','🌼'][Math.floor(Math.random()*3)];
    p.r = 8 + Math.random() * 8;
    p.vy = 40 + Math.random() * 60;
    p.vx = -25 + Math.random() * 50;
    p.rot = Math.random() * Math.PI * 2;
    p.rotSpd = (-1+Math.random()*2) * 1.2;
    p.alpha = 0.55 + Math.random() * 0.4;
  }
  return p;
}

function tickWeather(dt) {
  const w = G.weather;
  if (w === 'sunny') return;
  if (w === 'foggy') {
    // Drifting large transparent blobs moving sideways
    const targets = 28;
    while (G.wxParticles.length < targets) {
      const p = { type: 'fogblob' };
      p.x = Math.random() * G.W;
      p.y = Math.random() * G.vH;
      p.r  = 80 + Math.random() * 130;
      p.vx = (10 + Math.random() * 18) * (Math.random() < 0.5 ? 1 : -1);
      p.vy = (-5 + Math.random() * 10);
      p.alpha = 0.12 + Math.random() * 0.16;
      G.wxParticles.push(p);
    }
    for (const p of G.wxParticles) {
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.x > G.W + p.r) p.x = -p.r;
      if (p.x < -p.r)      p.x = G.W + p.r;
      if (p.y < -p.r)      p.y = G.vH + p.r;
      if (p.y > G.vH + p.r) p.y = -p.r;
    }
    return;
  }

  // Replenish particles
  const targets = {drizzle:120, raining:280, snowing:160, blizzard:420, fall:50, blossom:50};
  const cap = targets[w] || 0;
  while (G.wxParticles.length < cap) G.wxParticles.push(mkWxParticle(w, false));

  for (const p of G.wxParticles) {
    if (w === 'drizzle' || w === 'raining') {
      p.x += p.vx * dt; p.y += p.vy * dt;
    } else if (w === 'snowing' || w === 'blizzard') {
      p.wobble += p.wobbleSpd * dt;
      p.x += p.vx * dt + Math.sin(p.wobble) * 0.5;
      p.y += p.vy * dt;
    } else if (w === 'fall' || w === 'blossom') {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.rot += p.rotSpd * dt;
    }
  }
  // Remove off-screen
  G.wxParticles = G.wxParticles.filter(p => p.y < G.vH + 20 && p.x > -30 && p.x < G.W + 30);
}

function drawWeather() {
  const w = G.weather;
  wxCanvas.width  = G.W;
  wxCanvas.height = G.vH;
  wxCtx.clearRect(0, 0, G.W, G.vH);

  if (w === 'night') {
    wxCtx.fillStyle = 'rgba(0,0,20,0.55)';
    wxCtx.fillRect(0, 0, G.W, G.vH);
    return;
  }
  if (w === 'foggy') {
    for (const p of G.wxParticles) {
      wxCtx.save();
      wxCtx.filter = 'blur(22px)';
      wxCtx.globalAlpha = p.alpha;
      wxCtx.fillStyle = 'rgba(200,215,230,1)';
      wxCtx.beginPath();
      wxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      wxCtx.fill();
      wxCtx.restore();
    }
    return;
  }

  for (const p of G.wxParticles) {
    wxCtx.save();
    if (w === 'drizzle' || w === 'raining') {
      wxCtx.globalAlpha = p.alpha;
      wxCtx.strokeStyle = w === 'raining' ? 'rgba(120,175,220,1)' : 'rgba(150,200,235,0.9)';
      wxCtx.lineWidth = w === 'raining' ? 2.2 : 1.4;
      wxCtx.beginPath();
      wxCtx.moveTo(p.x, p.y);
      wxCtx.lineTo(p.x + p.vx * 0.03, p.y + p.len);
      wxCtx.stroke();
    } else if (w === 'snowing' || w === 'blizzard') {
      wxCtx.globalAlpha = w === 'blizzard' ? 0.72 + Math.random() * 0.18 : 0.6 + Math.random() * 0.25;
      wxCtx.fillStyle = p.color;
      wxCtx.beginPath();
      wxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      wxCtx.fill();
    } else if (w === 'fall' || w === 'blossom') {
      wxCtx.globalAlpha = p.alpha;
      wxCtx.font = `${p.r * 2}px serif`;
      wxCtx.textAlign = 'center'; wxCtx.textBaseline = 'middle';
      wxCtx.translate(p.x, p.y); wxCtx.rotate(p.rot);
      wxCtx.fillText(p.emoji, 0, 0);
    }
    wxCtx.restore();
  }
}

/* ================================================================
   SPECIAL MONSTER TYPES
   Special types: archer, musician, ice, warrior
   Boss-only:     eruptor, king
================================================================ */

// Syllable pools for projectiles
const ARROW_SYLS_EASY  = ['가','나','다','마','바','사','아','자','하','라','카','타','파'];
const ARROW_SYLS_HARD  = ['꽃','닭','삶','읽','많','싫','밝','흙','넋','낚','볶','닮'];
const NOTE_SYLS_EASY   = ['아','야','어','여','오','요','우','유','으','이'];
const NOTE_SYLS_ADV    = ['와','워','외','위','의','왜','웨'];
const ICE_CONSONANTS   = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const INSTRUMENTS      = ['🎤','🎹','🥁','🪘','🪇','🎷','🎺','🪗','🎸','🪕','🎻','🪈','🪉','🎙️'];
const NOTES            = ['🎶','🎵','🎼'];
const BOSS_EMOJIS      = ['🦖','🐉','🗿','🛸','🪬'];

// Max special monsters per wave
function specialCap(wn) {
  if (wn < 5)  return 0;
  if (wn < 10) return 1;
  if (wn < 15) return 2;
  if (wn < 20) return 3;
  return 999;
}

// Chance a given monster is special (increases with wave)
function specialChance(wn) {
  if (wn < 5)  return 0;
  if (wn < 10) return 0.18;
  if (wn < 15) return 0.28;
  if (wn < 20) return 0.35;
  return 0.42;
}

function pickSpecialType(wn) {
  const pool = ['archer', 'musician'];
  if (wn >= 10) pool.push('ice', 'warrior');
  return pool[Math.floor(Math.random() * pool.length)];
}

// Build template with special type attached
function applySpecial(tmpl, stype, wn) {
  // Special monsters can have 1-2 extra syllables
  const extra = Math.random() < 0.4 ? 1 : (Math.random() < 0.2 ? 2 : 0);
  const extraWds = extra > 0 ? pickWords(wn, extra) : [];
  return {
    ...tmpl,
    special: stype,
    words: [...tmpl.words, ...extraWds],
    hp: tmpl.hp + extra,
    maxHp: tmpl.maxHp + extra,
    // special cost multiplier: 1.6x slower
    spdMult: 0.62,
  };
}

/* ================================================================
   WAVE GENERATION (updated with specials)
================================================================ */
function genWave(wn) {
  const boss = wn % 10 === 0;
  if (boss) {
    const hp  = Math.min(5 + Math.floor(wn/10)*2, 15);
    const wds = pickWords(wn, hp + 2);
    // Boss type variety
    const bossEmoji = BOSS_EMOJIS[Math.floor(Math.random() * BOSS_EMOJIS.length)];
    // Boss can be special type for extra challenge
    const bossSpecialPool = ['eruptor', 'king', null, null, null]; // weight toward normal
    if (wn >= 20) bossSpecialPool.push('eruptor','king','archer','musician');
    const bossSpecial = bossSpecialPool[Math.floor(Math.random() * bossSpecialPool.length)];
    return [{ type:'boss', hp, maxHp:hp, words:wds, bossEmoji, special: bossSpecial, spdMult: bossSpecial ? 0.45 : 1 }];
  }

  const budget  = wavePointBudget(wn);
  const templates = [];
  let spent = 0;
  let specialCount = 0;
  const cap = specialCap(wn);
  const chance = specialChance(wn);

  while (spent < budget) {
    const hp   = calcHP(wn);
    const cost = hp;
    if (spent + cost > budget && templates.length > 0) break;
    let tmpl = { type:'normal', hp, maxHp:hp, words: pickWords(wn, hp) };
    // Maybe make special
    if (specialCount < cap && Math.random() < chance) {
      const stype = pickSpecialType(wn);
      tmpl = applySpecial(tmpl, stype, wn);
      specialCount++;
    }
    templates.push(tmpl);
    spent += cost;
  }

  return templates;
}

/* ================================================================
   SPECIAL MONSTER TICK HELPERS
================================================================ */
function tickSpecialMonster(m, dt, px, py) {
  // Proximity factor: the closer to player, the less likely to shoot
  // At 70% of screen height (far) = full chance; at 90%+ (close) = near zero
  const yPct = m.y / G.vH; // 0 = top, 1 = bottom
  // shootProb: 1.0 when yPct <= 0.55, linearly drops to 0.05 at yPct >= 0.85
  const shootProb = Math.max(0.05, Math.min(1.0, 1.0 - (yPct - 0.55) / 0.30));

  // Archer: shoot arrows
  if (m.special === 'archer') {
    if (m.arrowCooldown === undefined) m.arrowCooldown = 0;
    if (m.shootPause === undefined) m.shootPause = 0;

    if (m.shootPause > 0) {
      m.shootPause -= dt;
      return;
    }

    m.arrowCooldown -= dt;
    const hasArrow = G.monsters.some(a => a.parentId === m.id && !a.dead);
    if (m.arrowCooldown <= 0 && m.y > G.vH * 0.35 && !hasArrow) {
      if (Math.random() < shootProb) {
        m.shootPause = 1.0;
        spawnArrow(m, px, py);
      }
      m.arrowCooldown = 3.5 + Math.random() * 2;
    }
  }

  // Musician: spawn notes periodically (not distance-gated)
  if (m.special === 'musician') {
    if (m.noteCooldown === undefined) m.noteCooldown = 2 + Math.random() * 2;
    m.noteCooldown -= dt;
    if (m.noteCooldown <= 0 && m.y > G.vH * 0.2) {
      m.noteCooldown = 2.5 + Math.random() * 2;
      spawnNote(m);
    }
  }

  // Ice: shoot ice cubes
  if (m.special === 'ice') {
    if (m.iceCooldown === undefined) m.iceCooldown = 3 + Math.random() * 2;
    m.iceCooldown -= dt;
    if (m.iceCooldown <= 0 && m.y > G.vH * 0.25) {
      if (Math.random() < shootProb) {
        spawnIce(m, px, py);
      }
      m.iceCooldown = 5 + Math.random() * 3;
    }
  }

  // Warrior: shield cycles
  if (m.special === 'warrior') {
    if (m.shieldTimer === undefined) m.shieldTimer = 3 + Math.random() * 4;
    if (m.shielded === undefined) m.shielded = false;
    if (m.shieldDur === undefined) m.shieldDur = 0;

    if (m.shielded) {
      m.shieldDur -= dt;
      if (m.shieldDur <= 0) { m.shielded = false; m.shieldTimer = 3 + Math.random() * 4; }
    } else {
      m.shieldTimer -= dt;
      if (m.shieldTimer <= 0) { m.shielded = true; m.shieldDur = 2.0; }
    }
  }
}

// Boss special tick (eruptor / king)
function tickBossSpecial(m, dt, px, py) {
  if (!m.special || m.type !== 'boss') return;

  if (m.special === 'eruptor') {
    if (m.eruptCooldown === undefined) m.eruptCooldown = 6 + Math.random() * 4;
    if (m.eruptActive === undefined) m.eruptActive = 0;

    if (m.eruptActive > 0) {
      m.eruptActive -= dt;
      if (m.eruptActive <= 0) m.eruptCooldown = 5 + Math.random() * 4;
      // Spawn fireballs during eruption
      if (m.nextFireball === undefined) m.nextFireball = 0;
      m.nextFireball -= dt;
      if (m.nextFireball <= 0) {
        m.nextFireball = 0.7 + Math.random() * 0.5;
        spawnFireball(px, py);
      }
      return; // paused
    }
    m.eruptCooldown -= dt;
    if (m.eruptCooldown <= 0) { m.eruptActive = 3.5; m.nextFireball = 0; }
  }

  if (m.special === 'king') {
    if (m.kingWaiting === undefined) m.kingWaiting = false;
    if (m.kingCooldown === undefined) m.kingCooldown = 7 + Math.random() * 4;

    if (m.kingWaiting) {
      // Wait until all ninjas killed
      const alive = G.monsters.some(n => n.parentId === m.id && !n.dead);
      if (!alive) { m.kingWaiting = false; m.kingCooldown = 6 + Math.random() * 4; }
      return; // paused, invulnerable
    }
    m.kingCooldown -= dt;
    if (m.kingCooldown <= 0) {
      m.kingWaiting = true;
      const count = 2 + Math.floor(Math.random() * 3); // 2-4 ninjas
      for (let i = 0; i < count; i++) spawnNinja(m);
    }
  }
}

// Spawn helpers
function spawnArrow(archer, px, py) {
  const syl = G.wave >= 10 && Math.random() < 0.3
    ? ARROW_SYLS_HARD[Math.floor(Math.random() * ARROW_SYLS_HARD.length)]

    x: archer.x, y: archer.y,

    size: 28,
    baseSpd: 180 + Math.random() * 60,
    get spd() { return this.baseSpd * (G.vH / G.H); },

    wob: 0, scl: 1, sclDir: 1,
    isProjectileMonster: true,

function spawnFireball(px, py) {

function spawnNinja(king) {

    labelColor: '#aaaaaa',
  };
  G.monsters.push(ninja);
}

/* ================================================================
   KILL BOSS → kill its minions
================================================================ */
function killBossMinions(bossId) {
  for (const m of G.monsters) {
    if (m.parentId === bossId && !m.dead) {
      explode(m.x, m.y, m.size);
      m.dead = true;
    }
  }
}

/* ================================================================
   FREEZE PLAYER
================================================================ */
function freezePlayer(dur) {
  if (G.godMode) return;
  G.frozen = true;
  G.freezeTimer = dur;
  freezeEl.classList.add('on');
  setTimeout(() => {
    G.frozen = false;
    freezeEl.classList.remove('on');
  }, dur * 1000);
}

function cheatSpawnBossOld() {}

/* ================================================================
   GAME LOOP
================================================================ */
function loop(ts) {
  if (G.phase !== 'play') return;
  const dt = Math.min((ts - G.last) / 1000, 0.08);
  G.last = ts;
  resizeCv();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  tickWeather(dt);
  drawWeather();
  if (!G.frozen) {
    tickMonsters(dt);
    tickProjs(dt);
  }
  tickParts(dt);
  drawMonsters();
  drawProjs();
  drawParts();
  requestAnimationFrame(loop);
}

function playerAreaH() { return paEl ? paEl.offsetHeight + 10 : 90; }

/* ================================================================
   MONSTER TICK
================================================================ */
function tickMonsters(dt) {
  const px = G.W / 2;
  const paH  = playerAreaH();
  const emojiCenterY = G.vH - paH + 10;
  const py   = emojiCenterY;
  const hitR = 38;

  for (const m of G.monsters) {
    if (m.dead) continue;

    // Walking animation
    m.wob += dt * 1.2;
    m.scl += dt * 0.35 * m.sclDir;
    if (m.scl > 1.025) m.sclDir = -1;
    if (m.scl < 0.975) m.sclDir =  1;

    // Special ticks (archer, musician, ice, warrior)
    if (m.special && m.type !== 'boss') tickSpecialMonster(m, dt, px, py);
    if (m.type === 'boss') tickBossSpecial(m, dt, px, py);

    // Freeze / paused-while-shooting checks
    const paused = (m.shootPause > 0)
      || (m.special === 'eruptor' && m.eruptActive > 0)
      || (m.special === 'king' && m.kingWaiting);

    if (!paused) {
      if (!m.tracking && m.y > G.vH * 0.3) m.tracking = true;

      // Arrows rotate toward player
      if (m.type === 'arrow') {
        m.angle = Math.atan2(py - m.y, px - m.x);
      }

      if (m.tracking) {
        const dx = px - m.x, dy = py - m.y;
        const d  = Math.hypot(dx, dy) || 1;
        m.x += (dx/d) * m.spd * dt;
        m.y += (dy/d) * m.spd * dt;
      } else {
        m.y += m.spd * dt;
      }
    }

    if (m.flash > 0) m.flash -= dt * 5;

    // Collision with player
    if (Math.hypot(m.x - px, m.y - py) < hitR + m.size * 0.22) {
      explode(m.x, m.y, m.size);
      m.dead = true;
      // Ice: freeze instead of damage
      if (m.isIce) {
        freezePlayer(1.0);
      } else if (!G.godMode) {
        hurtPlayer(m.maxHp);
      }
      onMonsterRemoved();
    }
  }
  G.monsters = G.monsters.filter(m => !m.dead);
}

/* ================================================================
   PROJECTILE TICK
================================================================ */
function tickProjs(dt) {
  const PROJ_SPD = 520;
  for (const p of G.projs) {
    // Home toward target
    const t = G.monsters.find(m => m.id === p.tid && !m.dead);
    if (!t) { p.dead = true; continue; }
    // Steer toward current target position
    const dx = t.x - p.x, dy = t.y - p.y;
    const d  = Math.hypot(dx, dy) || 1;
    p.vx = (dx/d) * PROJ_SPD;
    p.vy = (dy/d) * PROJ_SPD;
    p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rs * dt;
    if (Math.hypot(p.x - t.x, p.y - t.y) < t.size * 0.4 + 8) {
      hitMonster(t); p.dead = true;
    }
    if (p.x<-100||p.x>G.W+100||p.y<-200||p.y>G.vH+100) p.dead = true;
  }
  G.projs = G.projs.filter(p => !p.dead);
}

/* ================================================================
   PARTICLE TICK
================================================================ */
function tickParts(dt) {
  for (const p of G.parts) {
    p.life -= dt * 2.2;
    p.y += (p.vy||0)*dt; if(p.vy) p.vy*=0.93;
    p.x += (p.vx||0)*dt; if(p.vx) p.vx*=0.90;
  }
  G.parts = G.parts.filter(p => p.life > 0);
}

/* ================================================================
   DRAW
================================================================ */
function drawMonsters() {
  // Pass 1: bodies
  for (const m of G.monsters) {
    if (m.dead) continue;
    ctx.save();
    ctx.translate(m.x, m.y);

    // Size shrinks proportionally as monster loses HP words
    // At maxHp: full size. At 1hp: 55% of full size. Linear in between.
    const hpRatio  = m.maxHp > 1 ? m.hp / m.maxHp : 1;
    const sizeScale = m.maxHp > 1 ? (0.55 + hpRatio * 0.45) : 1;
    const drawSz   = m.size * sizeScale;

    // Arrow rotation — ➷ glyph points roughly East (right), offset by -PI/4
    if (m.type === 'arrow' && m.angle !== undefined) {
      ctx.rotate(m.angle - Math.PI / 4);
    } else {
      ctx.translate(Math.sin(m.wob) * 3, 0);
    }
    ctx.scale(m.scl, m.scl);

    if (m.flash > 0) ctx.filter = `brightness(${1 + m.flash * 2.5})`;
    const shadowPulse = 0.5 + 0.5 * Math.abs(Math.sin(m.wob));
    ctx.shadowColor = 'rgba(0,0,0,0.82)';
    ctx.shadowBlur  = 12 + shadowPulse * 10;
    ctx.shadowOffsetY = 3 + shadowPulse * 4;
    ctx.font = `${drawSz}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(m.emoji, 0, 0);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.filter = 'none';

    // Wield icon (bottom-right, proportional to drawSz)
    if (m.wieldIcon) {
      const wSz = Math.max(14, drawSz * 0.42);
      const shieldScale = (m.special === 'warrior' && m.shielded) ? 2.2 : 1.0;
      ctx.font = `${wSz * shieldScale}px serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(m.wieldIcon, drawSz * 0.38, drawSz * 0.4);
    }

    // Hearts (above emoji, proportional to drawSz)
    if (!m.isProjectileMonster) {
      const heartSz = Math.max(8, 13 - m.maxHp * 0.5);
      ctx.font = `${heartSz}px serif`;
      const heartY = -(drawSz * 0.6 + 14);
      const hearts = Array.from({length:m.maxHp},(_,i)=>i<m.hp?'❤️':'🖤').join('');
      ctx.textBaseline = 'middle';
      ctx.fillText(hearts, 0, heartY);
    }
    ctx.restore();
  }

  // Pass 2: word labels
  for (const m of G.monsters) {
    if (m.dead) continue;
    if (m.special === 'warrior' && m.shielded && m.shieldDur > 1.0) continue;
    if (m.type === 'boss' && m.special === 'king' && m.kingWaiting) continue;

    const hpRatio  = m.maxHp > 1 ? m.hp / m.maxHp : 1;
    const sizeScale = m.maxHp > 1 ? (0.55 + hpRatio * 0.45) : 1;
    const drawSz   = m.size * sizeScale;

    ctx.save();
    ctx.translate(m.x, m.y);

    const LABEL_FONTS = ['"Noto Sans KR"', '"Song Myung"', '"Nanum Myeongjo"'];
    const fontFace = G.varyFonts ? LABEL_FONTS[m.id % LABEL_FONTS.length] : '"Noto Sans KR"';
    const wordSz  = Math.max(16, 23 - (m.word?.length || 0) * 0.3);
    ctx.font      = `bold ${wordSz}px ${fontFace}, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor   = 'rgba(0,0,0,1)';
    ctx.shadowBlur    = 6; ctx.shadowOffsetY = 2;
    ctx.strokeStyle = 'rgba(0,0,0,.98)';
    ctx.lineWidth   = 5;
    if (m.labelColor) {
      ctx.fillStyle = m.labelColor;
    } else if (m.type === 'boss') {
      ctx.fillStyle = '#ffd700';
    } else {
      ctx.fillStyle = '#fff';
    }

    if (m.word) {
      const belowY = drawSz * 0.6 + 18;
      ctx.strokeText(m.word, 0, belowY);
      ctx.shadowBlur = 0;
      ctx.fillText(m.word, 0, belowY);
    }
    ctx.restore();
  }
}

function drawProjs() {
  const now = performance.now();
  for (const p of G.projs) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    // Arc illusion: scale and shadow pulse over 0.35s launch window
    const age = Math.min(1, (now - (p.born || now)) / 350); // 0→1 over 350ms
    // Sine arc: peaks at t=0.5, so size goes small→big→small
    const arcT = Math.sin(age * Math.PI); // 0→1→0
    const drawSize = p.size * (0.55 + arcT * 0.55); // 55%→110%→55% of base
    const shadowSz = 4 + arcT * 18;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = shadowSz;
    ctx.shadowOffsetY = 2 + arcT * 8;
    ctx.font = `${drawSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  }
}

function drawParts() {
  for (const p of G.parts) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, p.x, p.y);
    ctx.restore();
  }
}

/* ================================================================
   TYPING INPUT
================================================================ */
typing.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = typing.value.trim();
  typing.value = '';
  if (!val) return;

  // Cheat code
  if (val === 'cheatcode') { openCheatMenu(); return; }

  // Find closest (highest y) matching monster — include projectile monsters
  let best = null, bestY = -Infinity;
  for (const m of G.monsters) {
    if (!m.dead && m.word === val && m.y > bestY) {
      bestY = m.y; best = m;
    }
  }
  if (best) {
    fire(best);
  } else {
    typing.style.color = '#ff4466';
    setTimeout(() => typing.style.color = '', 280);
  }
});

/* ================================================================
   WAVE MANAGEMENT
================================================================ */
function startWave(wn) {
  G.wave    = wn;
  G.wPhase  = 'announce';
  G.monsters = []; G.projs = [];
  G.wTemplates = [];

  const tmpls = genWave(wn);
  hwNum.textContent = wn;
  const nb = Math.ceil(wn/10)*10;
  hwBoss.textContent = wn%10===0
    ? 'BOSS WAVE!'
    : `Boss in ${nb-wn}`;
  ringArc.setAttribute('stroke-dasharray', '0 100');
  setBG(wn);

  // Roll weather (from wave 5 onwards)
  initWeather(rollWeather(wn));

  const wxEmoji = WEATHER_ICONS[G.weather] || '🌞';
  const bossEmojiMsg = tmpls[0]?.bossEmoji || '🐉';
  const msg = wn%10===0
    ? `${bossEmojiMsg} Wave ${wn}\nBOSS!`
    : `화이팅!\nWave ${wn} ${wxEmoji}`;
  announce(msg, () => {
    G.wPhase = 'spawning';
    initWaveSpawner(tmpls);
  });
}

function waveComplete() {
  if (G.wPhase === 'wdone') return;
  G.wPhase = 'wdone';
  // Post-boss heal: restore full HP + gain 1 max HP (cap 100)
  if (G.wave % 10 === 0) {
    G.playerMax = Math.min(100, G.playerMax + 1);
    G.playerHP  = G.playerMax;
    refreshLives();
  }
  showConfetti();
  setTimeout(() => startWave(G.wave + 1), 3600);
}

function announce(msg, cb) {
  annTxt.innerHTML = msg.replace('\n', '<br>');
  annTxt.classList.add('on');
  setTimeout(() => {
    annTxt.classList.remove('on');
    setTimeout(cb, 380);
  }, 2100);
}

function setBG(wn) {
  const idx = Math.min(Math.floor((wn-1)/10), BGS.length-1);
  const [t, b] = BGS[idx];
  document.documentElement.style.setProperty('--bg-top', t);
  document.documentElement.style.setProperty('--bg-bot', b);
  document.body.style.background = `linear-gradient(180deg,${t} 0%,${b} 100%)`;
}

/* ================================================================
   CONFETTI
================================================================ */
function showConfetti() {
  cfxEl.querySelectorAll('.cp').forEach(e => e.remove());
  const cols = ['#ff4466','#ffd700','#4caf50','#2196f3','#9c27b0','#ff9800','#00bcd4','#ff6b9d'];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}%;background:${cols[i%cols.length]};
      width:${6+Math.random()*7}px;height:${10+Math.random()*12}px;
      animation-duration:${1.4+Math.random()*2}s;
      animation-delay:${Math.random()*0.6}s;transform-origin:center;`;
    cfxEl.appendChild(p);
  }
  wellDone.classList.add('on');
  setTimeout(() => wellDone.classList.remove('on'), 2600);
}

/* ================================================================
   PLAYER HUD
================================================================ */
function refreshLives() {
  plEmoji.textContent = G.hero;
  const h = Array.from({length:G.playerMax},(_,i)=>i<G.playerHP?'❤️':'🖤').join('');
  plLives.textContent = h;
}

/* ================================================================
   CANVAS RESIZE
================================================================ */
function resizeCv() {
  if (canvas.width!==G.W||canvas.height!==G.vH) {
    canvas.width=G.W; canvas.height=G.vH;
  }
}

/* ================================================================
   START / RESET / END
================================================================ */
function startGame() {
  const lv = parseInt(document.getElementById('inp-lives').value)||10;
  G.playerMax = Math.min(100, Math.max(1, lv));
  G.playerHP  = G.playerMax;
  G.varyFonts      = document.getElementById('chk-fonts')?.checked ?? true;
  G.weatherEnabled = document.getElementById('chk-weather')?.checked ?? true;
  G.hero      = computeHeroEmoji();
  G.score     = 0;
  G.phase     = 'play';
  G.W  = window.innerWidth;
  G.H  = G.vH = window.innerHeight;
  G.isMob = G.W < 600;

  scrTitle.classList.add('off');
  hudEl.style.display = 'flex';
  paEl.style.display  = 'flex';

  hsVal.textContent = '0';
  hsBest.textContent = G.hiScore.toLocaleString();
  resizeCv();
  refreshLives();
  rollNextSpell();
  typing.focus();

  G.last = performance.now();
  requestAnimationFrame(ts => { G.last=ts; requestAnimationFrame(loop); });
  startWave(1);
}

function resetState() {
  G.phase = 'title';
  G.monsters=[]; G.projs=[]; G.parts=[];
  G.wTemplates=[];
  G.frozen = false; G.freezeTimer = 0;
  G.wxParticles = [];
  G.godMode = false;
  freezeEl.classList.remove('on');
  hudEl.style.display='none';
  paEl.style.display='none';
  setBG(1);
  initWeather('sunny');
}

function endGame() {
  G.phase = 'over';

  // High score
  const isNew = G.score > G.hiScore && G.wave >= 3;
  if (G.score > G.hiScore) {
    G.hiScore = G.score;
    localStorage.setItem('kth_hi', G.hiScore);
    hsBest.textContent = G.hiScore.toLocaleString();
  }

  const goTitle = document.getElementById('go-title');
  const goDetail = document.getElementById('go-detail');
  const goHi = document.getElementById('go-hiscore');

  if (isNew) {
    goTitle.textContent = '🏅 New Record!';
    showConfetti();
  } else {
    goTitle.textContent = '🪦 게임 오버';
  }
  goDetail.textContent = `Wave ${G.wave}  •  Score: ${G.score.toLocaleString()}`;
  goHi.textContent     = `Best: ${G.hiScore.toLocaleString()}`;

  scrOver.classList.remove('off');
  hudEl.style.display='none';
  paEl.style.display='none';
}

/* ================================================================
   RESIZE GUARD
================================================================ */
let _initW=window.innerWidth, _rzt;
window.addEventListener('resize', () => {
  clearTimeout(_rzt);
  _rzt = setTimeout(() => {
    const nw = window.innerWidth;
    if (G.phase==='play' && Math.abs(nw-_initW)>60) {
      // treat as game over but show different message
      G.phase='over';
      const goTitle=document.getElementById('go-title');
      goTitle.textContent='🪦 Window Resized';
      document.getElementById('go-detail').textContent=
        `Window was resized. Wave ${G.wave}  •  Score: ${G.score.toLocaleString()}`;
      document.getElementById('go-hiscore').textContent=`Best: ${G.hiScore.toLocaleString()}`;
      scrOver.classList.remove('off');
      hudEl.style.display='none'; paEl.style.display='none';
    }
    _initW=nw;
  }, 280);
});

/* ================================================================
   VISUAL VIEWPORT — mobile keyboard
================================================================ */
if ('visualViewport' in window) {
  window.visualViewport.addEventListener('resize', () => {
    updateAnnounceCenterY();
    if (G.phase !== 'play') return;
    const vvh = window.visualViewport.height;
    const oldVH = G.vH;
    G.vH = vvh;
    canvas.height = vvh;
    const kb = window.innerHeight - vvh;
    paEl.style.bottom = Math.max(0, kb) + 'px';
    // Rescale monster y positions proportionally so they stay at the
    // same relative position in the new viewport — prevents monsters
    // that are near the bottom from jumping below the player and homing upward.
    if (oldVH > 0 && vvh !== oldVH) {
      const ratio = vvh / oldVH;
      for (const m of G.monsters) {
        if (m.y > 0) m.y = m.y * ratio;
      }
    }
    // Speed is now a live getter on each monster (baseSpd * G.vH/G.H),
    // so no speed mutation needed here.
  });
}

/* ================================================================
   KEEP FOCUS
================================================================ */
document.addEventListener('pointerdown', e => {
  if (G.phase === 'play') typing.focus();
});

/* ================================================================
   INIT
================================================================ */
resizeCv();
setBG(1);
</script>
